<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nuevo Producto - CoffeePOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-variant": "#f2dfd6",
                      "inverse-primary": "#ffb691",
                      "outline": "#897267",
                      "on-primary": "#ffffff",
                      "surface-container-highest": "#f2dfd6",
                      "secondary-container": "#fecf9e",
                      "on-error-container": "#93000a",
                      "on-tertiary-container": "#c2d6ff",
                      "on-secondary-fixed-variant": "#60401b",
                      "surface-container-high": "#f8e4dc",
                      "primary": "#763000",
                      "surface": "#fff8f6",
                      "inverse-on-surface": "#ffede6",
                      "surface-dim": "#e9d6ce",
                      "outline-variant": "#ddc1b4",
                      "on-secondary": "#ffffff",
                      "on-secondary-fixed": "#2c1700",
                      "on-tertiary-fixed-variant": "#00468d",
                      "surface-container-low": "#fcfaf8",
                      "primary-fixed-dim": "#ffb691",
                      "primary-fixed": "#ffdbcb",
                      "on-secondary-container": "#79562f",
                      "surface-tint": "#9e4302",
                      "surface-bright": "#fff8f6",
                      "on-tertiary": "#ffffff",
                      "secondary": "#7a5730",
                      "on-primary-fixed-variant": "#793100",
                      "tertiary": "#00448a",
                      "surface-container-lowest": "#ffffff",
                      "on-surface": "#231915",
                      "on-background": "#151c27",
                      "inverse-surface": "#392e29",
                      "on-tertiary-fixed": "#001b3e",
                      "surface-container": "#f5f1ed",
                      "tertiary-fixed": "#d6e3ff",
                      "error-container": "#ffdad6",
                      "tertiary-fixed-dim": "#aac7ff",
                      "on-surface-variant": "#564339",
                      "secondary-fixed-dim": "#ecbe8e",
                      "background": "#fff8f6",
                      "primary-container": "#9b4100",
                      "secondary-fixed": "#ffdcbb",
                      "on-primary-fixed": "#341100",
                      "on-error": "#ffffff",
                      "error": "#ba1a1a",
                      "tertiary-container": "#035bb4",
                      "on-primary-container": "#ffcab1"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "touch-target-min": "64px",
                      "edge-margin": "2rem",
                      "asymmetric-gap-sm": "1.5rem",
                      "asymmetric-gap-lg": "2rem",
                      "vertical-rhythm": "1.5rem"
              },
              "fontFamily": {
                      "body-lg": ["Inter"],
                      "title-md": ["Inter"],
                      "title-lg": ["Inter"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "label-md": ["Inter"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "display-lg": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "title-md": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                      "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                      "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-modal {
            background-color: rgba(242, 223, 214, 0.6); /* surface-variant at 60% opacity */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        /* Hide scrollbar for cleaner look if needed */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-edge-margin font-body-lg text-body-lg text-on-surface">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-background/10 backdrop-blur-sm flex items-center justify-center z-50 p-4">
<!-- Modal Card -->
<div class="w-full max-w-[600px] glass-modal rounded-xl shadow-[0px_12px_32px_rgba(35,25,21,0.06)] border border-outline-variant/15 overflow-hidden flex flex-col">
<!-- Header -->
<div class="px-asymmetric-gap-lg pt-asymmetric-gap-lg pb-6">
<div class="flex justify-between items-center">
<h2 class="font-headline-md text-headline-md text-primary">Nuevo Producto</h2>
<button aria-label="Cerrar" class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-highest text-on-surface-variant hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-2">Añade los detalles de la nueva oferta artesanal.</p>
</div>
<!-- Form Body -->
<div class="px-asymmetric-gap-lg pb-asymmetric-gap-lg flex flex-col gap-vertical-rhythm flex-grow overflow-y-auto">
<!-- Image Upload (Tactile Component) -->
<div class="w-full bg-surface-container-low rounded-lg border border-dashed border-outline-variant/50 p-6 flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-surface-container transition-colors">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
</div>
<div class="text-center">
<p class="font-title-md text-title-md text-primary">Añadir Imagen</p>
<p class="font-label-md text-label-md text-on-surface-variant mt-1">JPEG, PNG hasta 5MB</p>
</div>
</div>
<!-- Input: Name -->
<div class="flex flex-col gap-2">
<label class="font-title-md text-title-md text-on-surface" for="product-name">Nombre</label>
<input class="w-full bg-surface-container-high border-none rounded-lg h-14 px-4 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary/30 transition-shadow" id="product-name" placeholder="Ej: Café Americano" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-vertical-rhythm">
<!-- Input: Category -->
<div class="flex flex-col gap-2">
<label class="font-title-md text-title-md text-on-surface" for="product-category">Categoría</label>
<div class="relative">
<select class="w-full bg-surface-container-high border-none rounded-lg h-14 px-4 pr-12 font-body-lg text-body-lg text-on-surface appearance-none focus:ring-2 focus:ring-primary/30 transition-shadow cursor-pointer" id="product-category">
<option disabled="" selected="" value="">Seleccionar...</option>
<option value="bebidas_calientes">Bebidas Calientes</option>
<option value="bebidas_frias">Bebidas Frías</option>
<option value="pasteleria">Pastelería</option>
<option value="granos">Granos de Café</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Input: Price -->
<div class="flex flex-col gap-2">
<label class="font-title-md text-title-md text-on-surface" for="product-price">Precio</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-title-md text-title-md text-on-surface-variant">$</span>
<input class="w-full bg-surface-container-high border-none rounded-lg h-14 pl-8 pr-4 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary/30 transition-shadow" id="product-price" placeholder="0.00" type="number"/>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-vertical-rhythm">
<!-- Input: Initial Stock -->
<div class="flex flex-col gap-2">
<label class="font-title-md text-title-md text-on-surface" for="product-stock">Stock Inicial</label>
<input class="w-full bg-surface-container-high border-none rounded-lg h-14 px-4 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary/30 transition-shadow" id="product-stock" placeholder="0" type="number"/>
</div>
<!-- Input: Status Toggle -->
<div class="flex flex-col gap-2 justify-center pt-8">
<label class="flex items-center cursor-pointer gap-4">
<div class="relative">
<input checked="" class="sr-only" type="checkbox"/>
<div class="block bg-primary w-14 h-8 rounded-full"></div>
<div class="dot absolute left-1 top-1 bg-on-primary w-6 h-6 rounded-full transition-transform translate-x-6"></div>
</div>
<span class="font-title-md text-title-md text-on-surface">Activo</span>
</label>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="bg-surface-container-lowest p-asymmetric-gap-lg flex justify-end gap-4 border-t border-outline-variant/15">
<button class="h-[64px] px-8 rounded-xl font-title-md text-title-md text-primary bg-transparent hover:bg-surface-container transition-colors">
                    Cancelar
                </button>
<button class="h-[64px] px-8 rounded-xl font-title-md text-title-md text-on-primary bg-gradient-to-br from-primary to-primary-container shadow-[0px_4px_12px_rgba(118,48,0,0.2)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="save" data-weight="fill" style="font-variation-settings: 'FILL' 1;">save</span>
                    Guardar Producto
                </button>
</div>
</div>
</div>
</body></html>
