{% extends "layout/base.html" %}

{% block title %}Nuevo Producto - Admin{% endblock %}

{% block content %}
<main class="flex-1 w-full max-w-3xl mx-auto p-4 md:p-8 flex flex-col gap-6">
    <div>
        <h1 class="font-headline-lg text-headline-lg text-primary">Nuevo Producto</h1>
        <p class="font-title-lg text-title-lg text-on-surface-variant mt-2">Agregar al Catálogo</p>
    </div>

    <div class="bg-surface-container-lowest rounded-2xl p-6 md:p-8 shadow-sm border border-outline-variant/15">
        <form action="{{ url_for('admin.create_product') }}" method="POST" class="flex flex-col gap-6">
            <label class="flex flex-col gap-2">
                <span class="font-title-md text-title-md text-on-surface">Nombre del Producto</span>
                <input name="name" class="w-full min-h-[56px] bg-surface-container-high text-on-surface font-body-lg text-body-lg rounded-lg px-4 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all border-none placeholder:text-on-surface-variant/50" type="text" placeholder="Ej. Café Americano" required/>
            </label>

            <label class="flex flex-col gap-2">
                <span class="font-title-md text-title-md text-on-surface">ID Categoría</span>
                <input name="category" class="w-full min-h-[56px] bg-surface-container-high text-on-surface font-body-lg text-body-lg rounded-lg px-4 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all border-none placeholder:text-on-surface-variant/50" type="text" placeholder="ID de la Categoría" required/>
            </label>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <label class="flex flex-col gap-2">
                    <span class="font-title-md text-title-md text-on-surface">Precio de Venta</span>
                    <input name="price" class="w-full min-h-[56px] bg-surface-container-high text-on-surface font-body-lg text-body-lg rounded-lg px-4 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all border-none placeholder:text-on-surface-variant/50" type="number" step="0.01" placeholder="0.00" required/>
                </label>
                
                <label class="flex flex-col gap-2">
                    <span class="font-title-md text-title-md text-on-surface">Costo Unitario</span>
                    <input name="unit_cost" class="w-full min-h-[56px] bg-surface-container-high text-on-surface font-body-lg text-body-lg rounded-lg px-4 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all border-none placeholder:text-on-surface-variant/50" type="number" step="0.01" placeholder="0.00" required/>
                </label>
            </div>

            <label class="flex flex-col gap-2">
                <span class="font-title-md text-title-md text-on-surface">Stock Inicial</span>
                <input name="stock" class="w-full min-h-[56px] bg-surface-container-high text-on-surface font-body-lg text-body-lg rounded-lg px-4 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all border-none placeholder:text-on-surface-variant/50" type="number" step="1" placeholder="0" required/>
            </label>

            <div class="flex justify-end gap-4 mt-4">
                <a href="{{ url_for('admin.dashboard') if 'admin.dashboard' in request.endpoint else '#' }}" class="min-h-[48px] px-6 rounded-xl font-title-md text-title-md text-primary bg-transparent hover:bg-surface-container transition-colors flex items-center justify-center">
                    Cancelar
                </a>
                <button type="submit" class="min-h-[48px] px-8 rounded-xl font-title-md text-title-md text-on-primary bg-primary hover:opacity-90 transition-opacity flex items-center justify-center shadow-sm">
                    Guardar Producto
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
