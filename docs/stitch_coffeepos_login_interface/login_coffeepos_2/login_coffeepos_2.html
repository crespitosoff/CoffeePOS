<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>

                      "secondary-fixed": "#ffdcbb",
                      "on-primary-fixed": "#341100",

              "spacing": {

                      "edge-margin": "2rem",
                      "asymmetric-gap-sm": "1.5rem",
                      "asymmetric-gap-lg": "2rem",
                      "vertical-rhythm": "1.5rem"
              },
              "fontFamily": {

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .ambient-shadow {
            box-shadow: 0px 12px 32px rgba(35, 25, 21, 0.06);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-lg min-h-screen flex flex-col justify-center items-center relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-surface-variant opacity-40 blur-[100px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-container opacity-30 blur-[120px]"></div>
</div>
<!-- Login Card Canvas -->
<main class="relative z-10 w-full max-w-md px-edge-margin">
<div class="glass-panel rounded-xl ambient-shadow border border-outline-variant/15 flex flex-col items-center pt-12 pb-8 px-8 lg:px-12">
<!-- Brand / Logo Area -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center mb-6 border border-outline-variant/20 ambient-shadow">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">
                        local_cafe
                    </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2 tracking-tight">CoffeePOS</h1>
<p class="font-title-md text-title-md text-on-surface-variant">Sistema de Punto de Venta</p>
</div>
<!-- Login Form -->
<form class="w-full flex flex-col gap-6">
<!-- Input: Usuario -->
<div class="relative flex flex-col">
<label class="sr-only" for="username">Usuario</label>
<div class="relative flex items-center bg-surface-container-high rounded-lg overflow-hidden group focus-within:ring-2 focus-within:ring-primary/30 transition-all duration-200">
<span class="material-symbols-outlined text-outline absolute left-4 pointer-events-none group-focus-within:text-primary transition-colors">
                            person
                        </span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-lg text-body-lg pl-12 pr-4 py-4 min-h-[56px] placeholder:text-outline-variant" id="username" placeholder="Usuario" type="text"/>
</div>
</div>
<!-- Input: Contraseña -->
<div class="relative flex flex-col">
<label class="sr-only" for="password">Contraseña</label>
<div class="relative flex items-center bg-surface-container-high rounded-lg overflow-hidden group focus-within:ring-2 focus-within:ring-primary/30 transition-all duration-200">
<span class="material-symbols-outlined text-outline absolute left-4 pointer-events-none group-focus-within:text-primary transition-colors">
                            lock
                        </span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-lg text-body-lg pl-12 pr-12 py-4 min-h-[56px] placeholder:text-outline-variant" id="password" placeholder="Contraseña" type="password"/>
<button class="absolute right-4 text-outline hover:text-on-surface-variant transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">
                                visibility
                            </span>
</button>
</div>
</div>
<!-- Spacer -->
<div class="h-2"></div>
<!-- Submit Button -->
<button class="w-full min-h-[touch-target-min] rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-title-lg text-title-lg flex items-center justify-center ambient-shadow hover:from-surface-tint hover:to-primary-container transition-all active:scale-[0.98] active:shadow-none" type="submit">
                    Iniciar Sesión
                </button>
</form>
<!-- Footer / Version -->
<div class="mt-10 pt-6 border-t border-outline-variant/15 w-full text-center">
<span class="font-label-md text-label-md text-outline">v1.0</span>
</div>
</div>
</main>
</body></html>
