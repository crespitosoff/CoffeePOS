<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#f2dfd6",
                        "inverse-primary": "#ffb691",
                        "outline": "#897267",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#f2dfd6",
                        "secondary-container": "#fecf9e",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#c2d6ff",
                        "on-secondary-fixed-variant": "#60401b",
                        "surface-container-high": "#f8e4dc",
                        "primary": "#763000",
                        "surface": "#fff8f6",
                        "inverse-on-surface": "#ffede6",
                        "surface-dim": "#e9d6ce",
                        "outline-variant": "#ddc1b4",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#2c1700",
                        "on-tertiary-fixed-variant": "#00468d",
                        "surface-container-low": "#fcfaf8",
                        "primary-fixed-dim": "#ffb691",
                        "primary-fixed": "#ffdbcb",
                        "on-secondary-container": "#79562f",
                        "surface-tint": "#9e4302",
                        "surface-bright": "#fff8f6",
                        "on-tertiary": "#ffffff",
                        "secondary": "#7a5730",
                        "on-primary-fixed-variant": "#793100",
                        "tertiary": "#00448a",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#231915",
                        "on-background": "#151c27",
                        "inverse-surface": "#392e29",
                        "on-tertiary-fixed": "#001b3e",
                        "surface-container": "#f5f1ed",
                        "tertiary-fixed": "#d6e3ff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#aac7ff",
                        "on-surface-variant": "#564339",
                        "secondary-fixed-dim": "#ecbe8e",
                        "background": "#fff8f6",
                        "primary-container": "#9b4100",
                        "secondary-fixed": "#ffdcbb",
                        "on-primary-fixed": "#341100",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-container": "#035bb4",
                        "on-primary-container": "#ffcab1"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "64px",
                        "edge-margin": "2rem",
                        "asymmetric-gap-sm": "1.5rem",
                        "asymmetric-gap-lg": "2rem",
                        "vertical-rhythm": "1.5rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "title-md": ["Inter"],
                        "title-lg": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-md": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "title-lg": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "display-lg": ["57px", { "lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-lg min-h-screen flex items-center justify-center p-edge-margin">
<!-- Payment Screen Component -->
<div class="bg-surface-container-low w-full max-w-[800px] rounded-xl p-asymmetric-gap-lg flex flex-col gap-vertical-rhythm">
<!-- Header -->
<header class="flex justify-between items-center w-full">
<h1 class="font-headline-md text-headline-md text-primary">Procesar Pago - Mesa 3</h1>
<button aria-label="Close" class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</header>
<!-- Main Content Layout (Asymmetric) -->
<div class="flex flex-col md:flex-row gap-asymmetric-gap-lg w-full">
<!-- Section 1: Order Summary -->
<div class="flex-1 bg-surface-container-lowest rounded-lg p-asymmetric-gap-sm flex flex-col gap-vertical-rhythm">
<h2 class="font-title-lg text-title-lg text-on-surface">Resumen de Orden</h2>
<div class="flex flex-col gap-4">
<div class="flex justify-between items-center">
<span class="font-body-lg text-body-lg text-on-surface-variant">2x Café Americano</span>
<span class="font-title-md text-title-md text-on-surface">$5,000</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-lg text-body-lg text-on-surface-variant">1x Croissant</span>
<span class="font-title-md text-title-md text-on-surface">$7,500</span>
</div>
</div>
<div class="mt-auto pt-asymmetric-gap-sm flex flex-col gap-2">
<div class="flex justify-between items-center text-on-surface-variant">
<span class="font-body-lg text-body-lg">Subtotal</span>
<span class="font-body-lg text-body-lg">$12,500</span>
</div>
<div class="flex justify-between items-center text-on-surface-variant">
<span class="font-body-lg text-body-lg">Propina (10%)</span>
<span class="font-body-lg text-body-lg">$1,250</span>
</div>
<div class="flex justify-between items-end mt-4">
<span class="font-title-lg text-title-lg text-on-surface">Total</span>
<span class="font-headline-md text-headline-md text-primary">$13,750</span>
</div>
</div>
</div>
<!-- Section 2 & 3: Payment Details -->
<div class="flex-[1.5] flex flex-col gap-vertical-rhythm">
<!-- Payment Method -->
<div class="bg-surface-container-lowest rounded-lg p-asymmetric-gap-sm flex flex-col gap-4">
<h3 class="font-title-md text-title-md text-on-surface">Método de Pago</h3>
<div class="grid grid-cols-3 gap-4">
<label class="flex flex-col items-center justify-center p-4 bg-secondary-container text-on-secondary-container rounded-lg cursor-pointer transition-all hover:bg-secondary-container/80 ring-2 ring-primary/30">
<input checked="" class="hidden" name="payment_method" type="radio" value="efectivo"/>
<span class="material-symbols-outlined mb-2" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-label-md text-label-md">Efectivo</span>
</label>
<label class="flex flex-col items-center justify-center p-4 bg-surface-container-high text-on-surface-variant rounded-lg cursor-pointer transition-all hover:bg-surface-variant">
<input class="hidden" name="payment_method" type="radio" value="tarjeta"/>
<span class="material-symbols-outlined mb-2" style="font-variation-settings: 'FILL' 0;">credit_card</span>
<span class="font-label-md text-label-md">Tarjeta</span>
</label>
<label class="flex flex-col items-center justify-center p-4 bg-surface-container-high text-on-surface-variant rounded-lg cursor-pointer transition-all hover:bg-surface-variant">
<input class="hidden" name="payment_method" type="radio" value="transferencia"/>
<span class="material-symbols-outlined mb-2" style="font-variation-settings: 'FILL' 0;">account_balance</span>
<span class="font-label-md text-label-md">Transferencia</span>
</label>
</div>
</div>
<!-- Cash Details -->
<div class="bg-surface-container-lowest rounded-lg p-asymmetric-gap-sm flex flex-col gap-4">
<label class="flex flex-col gap-2">
<span class="font-title-md text-title-md text-on-surface">Monto Recibido</span>
<div class="relative flex items-center">
<span class="absolute left-4 font-title-lg text-title-lg text-on-surface-variant">$</span>
<input class="w-full h-touch-target-min bg-surface-container-high text-on-surface font-title-lg text-title-lg rounded-lg pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all border-none placeholder:text-on-surface-variant/50" type="text" value="20,000"/>
</div>
</label>
<div class="mt-4 flex justify-between items-end bg-surface-container rounded-lg p-4">
<span class="font-title-md text-title-md text-on-surface-variant">Cambio</span>
<span class="font-headline-lg text-headline-lg text-primary">$6,250</span>
</div>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex justify-end gap-4 mt-asymmetric-gap-sm w-full">
<button class="h-touch-target-min px-8 rounded-xl font-title-md text-title-md text-primary bg-transparent hover:bg-surface-container transition-colors">
                Cancelar
            </button>
<button class="h-touch-target-min px-12 rounded-xl font-title-md text-title-md text-on-primary bg-gradient-to-r from-primary to-primary-container hover:from-primary-container hover:to-primary transition-all">
                Confirmar Pago
            </button>
</div>
</div>
</body></html>
